<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Score environnemental des communes</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <main class="container">
    <h1>Score environnemental des communes</h1>
    <p class="subtitle">
      Recherchez une commune et découvrez sa note environnementale sur 100
    </p>

    <input
      type="text"
      placeholder="Ex : Grenoble"
      class="search-input"
    >

    <div class="result">
      <h2>Grenoble</h2>
      <div class="score">78 / 100</div>

      <ul class="details">
        <li>🚲 Mobilité : 20 / 25</li>
        <li>⚡ Énergie : 18 / 25</li>
        <li>♻️ Déchets : 22 / 25</li>
        <li>🌳 Biodiversité : 18 / 25</li>
      </ul>
    </div>
  </main>

</body>
</html>
